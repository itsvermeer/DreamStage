<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DreamStage – K‑Pop Rhythm Dance</title>
  <link rel="icon" type="image/png" href="assets/background/icon.png">
  <link rel="stylesheet" href="css/overlay.css">
</head>
<body>
  <!-- Full‑screen background -->
  <div id="game-background"></div>

  <!-- Full‑screen overlays (menus, pop‑ups) -->
  <div id="global-overlays">
    <!-- Start Screen -->
    <div id="start-screen" class="full-overlay">
      <img src="assets/background/logo.png" alt="DreamStage Logo" style="width:360px; margin-bottom:1rem;" />
      <p class="subtitle">Created by: <strong>Its.vermeer</strong></p>
      <p class="subtitle" style="font-size:1rem; margin-top:0;">a Dance Battle</p>
      <div style="margin-top:1.5rem; display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;">
        <button id="btn-start">▶ START GAME</button>
        <button id="btn-multiplayer">🔒 Multiplayer</button>
      </div>
      <div style="margin-top:1rem; display:flex; gap:1rem;">
        <button id="btn-settings">⚙️ Settings</button>
        <button id="btn-about">ℹ️ About</button>
      </div>
    </div>

    <!-- Multiplayer popup -->
    <div id="multiplayer-popup" class="popup hidden">
      <p>Currently working on it.<br>Not available right now.</p>
      <button id="btn-close-multiplayer">Close</button>
    </div>

    <!-- Character Selection -->
    <div id="char-select-screen" class="full-overlay hidden">
      <h2>Choose Your Dancer</h2>
      <div id="char-grid">
        <button class="char-btn" data-char="ruru">
          <span class="char-name">Ruru</span>
          <span class="char-buff">💖 +50 Perfect Bonus</span>
        </button>
        <button class="char-btn" data-char="canny">
          <span class="char-name">Canny</span>
          <span class="char-buff">⭐ +30 Great Bonus</span>
        </button>
        <button class="char-btn" data-char="riri">
          <span class="char-name">Riri</span>
          <span class="char-buff">🔥 Combo ×1.2</span>
        </button>
        <button class="char-btn" data-char="asa">
          <span class="char-name">Asa</span>
          <span class="char-buff">✨ Score ×1.2</span>
        </button>
        <button class="char-btn" data-char="leo">
          <span class="char-name">Leo</span>
          <span class="char-buff">🛡️ 5 Miss Shields</span>
        </button>
        <button class="char-btn" data-char="marco">
          <span class="char-name">Marco</span>
          <span class="char-buff">⚡ Arrow Speed +</span>
        </button>
        <button class="char-btn" data-char="jin">
          <span class="char-name">Jin</span>
          <span class="char-buff">🍀 Lucky Bonus</span>
        </button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="full-overlay hidden">
      <div id="result-grade">S</div>
      <h2 id="result-title">Legendary!</h2>
      <div id="result-stats"></div>
      <button id="btn-restart" type="button">🔄 PLAY AGAIN</button>
    </div>

    <!-- Settings pop‑up -->
    <div id="settings-popup" class="popup hidden">
      <h3>Settings</h3>
      <label>Music Volume: <input type="range" id="volume-slider" min="0" max="100" value="45"></label>
      <label>
        <input type="checkbox" id="sfx-toggle" checked> SFX Sounds
      </label>
      <button id="btn-close-settings">Close</button>
    </div>

    <!-- About pop‑up -->
    <div id="about-popup" class="popup hidden">
      <h3>About DreamStage</h3>
      <p>K‑Pop inspired rhythm dance game.<br>
      Created by <strong>Its.vermeer</strong><br>
      Version 1.8<br>
      © 2026 Its.vermeer</p>
      <button id="btn-close-about">Close</button>
    </div>
  </div>

  <!-- Full‑screen 3D Stage -->
  <div id="stage-container"></div>

  <!-- Game HUD (overlaid on canvas) -->
  <div id="hud" class="hidden">
    <div class="song-name" id="song-display">🎵 No song</div>
    <div class="hud-top">
      <span id="score-display">Score: 0</span>
      <span id="combo-display">Combo: 0</span>
      <span id="round-display">Round 1 / 3</span>
    </div>
    <div id="arrow-lanes">
      <div class="lane"><div class="hit-zone"></div><span>←</span></div>
      <div class="lane"><div class="hit-zone"></div><span>↑</span></div>
      <div class="lane"><div class="hit-zone"></div><span>↓</span></div>
      <div class="lane"><div class="hit-zone"></div><span>→</span></div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.4.0/lib/three-vrm.module.js"
      }
    }
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
